services:
  - type: web
    name: omnichat-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    # Free is for MVP smoke tests only. Use starter or higher before production LINE webhooks.
    plan: free
    region: singapore
    branch: main
    autoDeploy: true
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: LINE_WEBHOOK_QUEUE_MODE
        value: inline
      - key: KNOWLEDGE_INGEST_QUEUE_MODE
        value: inline
      - key: AUTOMATION_QUEUE_MODE
        value: inline
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: APP_BASE_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: MINIO_ENDPOINT
        sync: false
      - key: MINIO_ACCESS_KEY
        sync: false
      - key: MINIO_SECRET_KEY
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_BACKUPS
        value: chatwai-backups
      - key: R2_BUCKET_STORAGE
        value: chatwai-storage
